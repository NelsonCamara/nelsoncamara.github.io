<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet — Nelson Camara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --blue:        #1A7BBF;                  
            --blue-light:  rgba(26, 123, 191, 0.08); 
            --blue-mid:    rgba(26, 123, 191, 0.2);  
            --text:        #0f172a;
            --text-muted:  #64748b;
            --border:      #e2e8f0;
            --bg:          #ffffff;
            --surface:     #f8fafc;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* ── NAV ─────────────────────────────────────────── */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 0 48px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.15s;
            white-space: nowrap;
        }

        .nav-back:hover { color: var(--blue); }
        .nav-back svg { width: 15px; height: 15px; flex-shrink: 0; }

        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--text);
            color: #fff;
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            transition: opacity 0.15s, transform 0.15s;
        }

        .github-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .github-btn svg { width: 15px; height: 15px; }

        /* ── PROJECT HERO ────────────────────────────────── */
        .project-hero {
            max-width: 860px;
            margin: 0 auto;
            padding: 56px 48px 44px;
            border-bottom: 1px solid var(--border);
        }

        .project-label {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 16px;
            background: var(--blue-light);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--blue-mid);
        }

        .project-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 20px;
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .meta-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--blue-light);
            color: var(--blue);
            border: 1px solid var(--blue-mid);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .meta-sep {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }

        .meta-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ── LAYOUT README + TOC ─────────────────────────── */
        .content-layout {
            max-width: 1160px;
            margin: 0 auto;
            padding: 48px 48px 96px;
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 56px;
            align-items: start;
        }

        /* ── README ──────────────────────────────────────── */
        .readme-wrapper {
            min-width: 0;
        }

        /* ── TABLE DES MATIÈRES ───────────────────────────── */
        .toc-sidebar {
            position: sticky;
            top: 80px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 0 16px;
            max-height: calc(100vh - 110px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toc-list::-webkit-scrollbar { width: 4px; }
        .toc-list::-webkit-scrollbar-track { background: transparent; }
        .toc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .toc-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 18px 14px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .toc-header svg {
            width: 13px;
            height: 13px;
            color: var(--blue);
            flex-shrink: 0;
        }

        .toc-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text);
        }

        .toc-list {
            list-style: none;
            padding: 0 8px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* h1 — niveau principal */
        .toc-list li.toc-h1 a {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            padding-left: 10px;
        }

        /* h2 — section */
        .toc-list li.toc-h2 a {
            font-size: 0.79rem;
            font-weight: 500;
            color: var(--text);
            padding-left: 10px;
        }

        /* h3 — sous-section */
        .toc-list li.toc-h3 a {
            font-size: 0.76rem;
            font-weight: 400;
            color: var(--text-muted);
            padding-left: 22px;
        }

        /* h4 — détail */
        .toc-list li.toc-h4 a {
            font-size: 0.73rem;
            font-weight: 400;
            color: var(--text-muted);
            padding-left: 34px;
            opacity: 0.8;
        }

        .toc-list li a {
            display: block;
            padding-top: 5px;
            padding-bottom: 5px;
            padding-right: 10px;
            text-decoration: none;
            line-height: 1.4;
            border-radius: 6px;
            border-left: 2px solid transparent;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .toc-list li a:hover {
            background: var(--blue-light);
            color: var(--blue);
        }

        .toc-list li a.toc-active {
            background: var(--blue-light);
            color: var(--blue);
            border-left-color: var(--blue);
            font-weight: 600;
        }

        .markdown-body {
            font-size: 0.9375rem;
            line-height: 1.75;
            color: var(--text);
        }

        .markdown-body > *:first-child { margin-top: 0; }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: var(--text);
            margin: 36px 0 12px;
            line-height: 1.3;
        }

        .markdown-body h1 { font-size: 1.75rem; }

        .markdown-body h2 {
            font-size: 1.3rem;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .markdown-body h3 { font-size: 1.05rem; }

        .markdown-body p { margin-bottom: 16px; }

        .markdown-body a {
            color: var(--blue);
            text-decoration: none;
            border-bottom: 1px solid var(--blue-mid);
            transition: border-color 0.15s;
        }

        .markdown-body a:hover { border-color: var(--blue); }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }

        .markdown-body li { margin-bottom: 6px; }

        .markdown-body code {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.875em;
            font-family: 'Courier New', monospace;
        }

        .markdown-body pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .markdown-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.875rem;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin: 16px 0;
        }

        .markdown-body blockquote {
            border-left: 3px solid var(--blue);
            padding: 4px 20px;
            color: var(--text-muted);
            margin: 20px 0;
            font-style: italic;
        }

        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .markdown-body th {
            background: var(--surface);
            padding: 10px 16px;
            text-align: left;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .markdown-body td {
            padding: 10px 16px;
            border: 1px solid var(--border);
        }

        .markdown-body tr:nth-child(even) td { background: var(--surface); }

        /* ── STATES ──────────────────────────────────────── */
        .state-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        /* ── FOOTER ──────────────────────────────────────── */
        footer {
            border-top: 1px solid var(--border);
            padding: 32px 48px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        footer a { color: var(--blue); text-decoration: none; }

        /* ── RESPONSIVE ──────────────────────────────────── */
        @media (max-width: 900px) {
            .content-layout {
                grid-template-columns: 1fr;
                padding: 32px 20px 60px;
                gap: 0;
            }
            .toc-sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .project-hero { padding: 40px 20px 32px; }
            footer { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<nav>
    <a class="nav-back" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Retour au portfolio
    </a>
    <a class="github-btn" id="githubBtn" href="#" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Voir sur GitHub
    </a>
</nav>

<div class="project-hero" id="projectHero">
    <div class="state-msg">Chargement...</div>
</div>

<div class="content-layout">
    <div class="readme-wrapper">
        <div class="markdown-body" id="readmeBody">
            <div class="state-msg">Chargement du README...</div>
        </div>
    </div>
    <aside class="toc-sidebar" id="tocSidebar" style="display:none">
        <div class="toc-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/>
            </svg>
            <span class="toc-label">Table des matières</span>
        </div>
        <ul class="toc-list" id="tocList"></ul>
    </aside>
</div>

<footer>
    <p>Nelson Camara — <a href="https://github.com/NelsonCamara" target="_blank" rel="noopener noreferrer">github.com/NelsonCamara</a></p>
</footer>

<script>
    const USERNAME = 'NelsonCamara';
    const params   = new URLSearchParams(window.location.search);
    const repoName = params.get('repo');
    const repoUrl  = params.get('url');

    const heroEl    = document.getElementById('projectHero');
    const readmeEl  = document.getElementById('readmeBody');
    const githubBtn = document.getElementById('githubBtn');

    if (!repoName || !repoUrl) {
        heroEl.innerHTML  = '<div class="state-msg">Projet introuvable.</div>';
        readmeEl.innerHTML = '';
    } else {
        document.title  = `${repoName.replace(/-/g, ' ')} — Nelson Camara`;
        githubBtn.href  = repoUrl;
        loadProject();
    }

    function buildToc() {
        const headings = readmeEl.querySelectorAll('h1, h2, h3, h4');
        if (headings.length < 2) return;

        const tocList    = document.getElementById('tocList');
        const tocSidebar = document.getElementById('tocSidebar');
        const slugCount  = {};

        headings.forEach(h => {
            // Générer un id unique à partir du texte
            const base = h.textContent.trim()
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-');
            slugCount[base] = (slugCount[base] || 0) + 1;
            const id = slugCount[base] > 1 ? `${base}-${slugCount[base]}` : base;
            h.id = id;

            const level = parseInt(h.tagName[1]);
            const li    = document.createElement('li');
            li.className = `toc-h${level}`;
            const a     = document.createElement('a');
            a.href      = `#${id}`;
            a.textContent = h.textContent.trim();
            a.addEventListener('click', e => {
                e.preventDefault();
                h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                history.pushState(null, '', `#${id}`);
            });
            li.appendChild(a);
            tocList.appendChild(li);
        });

        tocSidebar.style.display = '';

        // Suivi de la section active au scroll
        const links = tocList.querySelectorAll('a');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    links.forEach(l => l.classList.remove('toc-active'));
                    const active = tocList.querySelector(`a[href="#${entry.target.id}"]`);
                    if (active) active.classList.add('toc-active');
                }
            });
        }, { rootMargin: '-10% 0px -80% 0px' });

        headings.forEach(h => observer.observe(h));
    }

    async function loadProject() {
        // Metadata
        try {
            const res = await fetch(`https://api.github.com/repos/${USERNAME}/${repoName}`);
            if (res.ok) {
                const repo    = await res.json();
                const lang    = repo.language || 'Inconnu';
                const updated = new Date(repo.updated_at).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

                heroEl.innerHTML = `
                    <span class="project-label">Projet</span>
                    <h1 class="project-name">${repo.name.replace(/-/g, ' ')}</h1>
                    <div class="project-meta">
                        <span class="meta-badge">${lang}</span>
                        ${repo.description ? `<span class="meta-sep"></span><span class="meta-text">${repo.description}</span>` : ''}
                        <span class="meta-sep"></span>
                        <span class="meta-text">Mis à jour ${updated}</span>
                    </div>
                `;
            } else {
                heroEl.innerHTML = `
                    <span class="project-label">Projet</span>
                    <h1 class="project-name">${repoName.replace(/-/g, ' ')}</h1>
                `;
            }
        } catch {
            heroEl.innerHTML = `
                <span class="project-label">Projet</span>
                <h1 class="project-name">${repoName.replace(/-/g, ' ')}</h1>
            `;
        }

        // README
        try {
            let res = await fetch(`https://raw.githubusercontent.com/${USERNAME}/${repoName}/main/README.md`);
            if (!res.ok) {
                res = await fetch(`https://raw.githubusercontent.com/${USERNAME}/${repoName}/master/README.md`);
            }

            if (res.ok) {
                const md = await res.text();
                marked.setOptions({ breaks: true, gfm: true });
                readmeEl.innerHTML = marked.parse(md);
                readmeEl.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                buildToc();
            } else {
                readmeEl.innerHTML = `
                    <div class="state-msg">
                        Aucun README disponible pour ce projet.<br><br>
                        <a href="${repoUrl}" target="_blank" rel="noopener noreferrer">Consulter le dépôt sur GitHub</a>
                    </div>
                `;
            }
        } catch {
            readmeEl.innerHTML = '<div class="state-msg">Erreur lors du chargement du README.</div>';
        }
    }
</script>

</body>
</html>
